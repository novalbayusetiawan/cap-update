name: Deploy Live Update
on:
  push:
    branches:
      - main
jobs:
  upload-file:
    runs-on: ubuntu-latest
    # Global env removed to allow devDependencies install
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install root dependencies
        run: npm install
      - name: Install example-app dependencies
        run: npm install
        working-directory: ./example-app
      - name: Build web assets
        run: npm run build
        working-directory: ./example-app
        env:
          NODE_ENV: production
      - name: Upload Live Update
        run: |
          npx laracap-cli apps:bundles:create \
            --path ${{ github.workspace }}/example-app/dist \
            --server "${{ secrets.LARACAP_SERVER_URL }}" \
            --token "${{ secrets.LARACAP_TOKEN }}" \
            --app-id 019dc873-ec06-7274-a7ee-59afd76c88e3 \
            --name "${{ github.ref }}" \
            --channel beta